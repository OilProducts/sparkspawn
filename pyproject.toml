[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sparkspawn"
version = "0.1.0"
description = "Add your description here"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111,<1.0",
    "httpx>=0.27,<1.0",
    "platformdirs>=4.0",
    "pydantic>=2.7,<3.0",
    "uvicorn[standard]>=0.30,<1.0",
]

[project.scripts]
sparkspawn = "sparkspawn.cli:main"
sparkspawn-workspace = "workspace.cli:main"
sparkspawn-ui-release-gate = "sparkspawn_app.ui_release_gate:main"

[tool.setuptools]
include-package-data = true
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["attractor*", "workspace*", "sparkspawn*", "sparkspawn_app*", "sparkspawn_common*"]

[tool.setuptools.package-data]
sparkspawn = ["starter_flows/*.dot", "guides/*.md"]
sparkspawn_app = ["ui_dist/**"]

[dependency-groups]
dev = [
    "pytest>=8.4.2",
]
