[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sparkspawn"
version = "0.1.0"
description = "Add your description here"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111,<1.0",
    "platformdirs>=4.0",
    "pydantic>=2.7,<3.0",
    "uvicorn[standard]>=0.30,<1.0",
]

[project.scripts]
sparkspawn = "attractor.cli:main"
sparkspawn-ui-release-gate = "attractor.ui_release_gate:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["attractor*"]

[tool.setuptools.package-data]
attractor = ["ui_dist/**"]

[dependency-groups]
dev = [
    "httpx>=0.27,<1.0",
    "pytest>=8.4.2",
]
