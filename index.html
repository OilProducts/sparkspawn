<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attractor | Flow Orchestration</title>

    <!-- Fonts: Inter (Sans) and JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (We configure the custom colors in JS to match CSS variables) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ["class"],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: {
                            DEFAULT: "hsl(var(--primary))",
                            foreground: "hsl(var(--primary-foreground))",
                        },
                        secondary: {
                            DEFAULT: "hsl(var(--secondary))",
                            foreground: "hsl(var(--secondary-foreground))",
                        },
                        destructive: {
                            DEFAULT: "hsl(var(--destructive))",
                            foreground: "hsl(var(--destructive-foreground))",
                        },
                        muted: {
                            DEFAULT: "hsl(var(--muted))",
                            foreground: "hsl(var(--muted-foreground))",
                        },
                        accent: {
                            DEFAULT: "hsl(var(--accent))",
                            foreground: "hsl(var(--accent-foreground))",
                        },
                        popover: {
                            DEFAULT: "hsl(var(--popover))",
                            foreground: "hsl(var(--popover-foreground))",
                        },
                        card: {
                            DEFAULT: "hsl(var(--card))",
                            foreground: "hsl(var(--card-foreground))",
                        },
                    },
                    borderRadius: {
                        lg: "var(--radius)",
                        md: "calc(var(--radius) - 2px)",
                        sm: "calc(var(--radius) - 4px)",
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @import "index.css";
    </style>

    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body class="h-screen flex flex-col antialiased">

    <!-- Top Navigation Bar -->
    <header class="h-14 border-b bg-background flex items-center justify-between px-6 shrink-0 z-50">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m18 16 4-4-4-4"></path>
                    <path d="m6 8-4 4 4 4"></path>
                    <path d="m14.5 4-5 16"></path>
                </svg>
                <span class="font-semibold tracking-tight">Attractor</span>
            </div>

            <!-- Custom Tabs Component built with standard classes -->
            <div
                class="inline-flex h-10 items-center justify-center rounded-md bg-muted p-1 text-muted-foreground w-[200px]">
                <button id="view-editor" onclick="switchView('editor')"
                    class="inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-medium ring-offset-background transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 flex-1 bg-background text-foreground shadow-sm view-tab">Editor</button>
                <button id="view-execution" onclick="switchView('execution')"
                    class="inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-medium ring-offset-background transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 flex-1 hover:text-foreground view-tab">Execution</button>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <label for="model" class="label-base text-muted-foreground">Model</label>
                <input type="text" id="model" placeholder="codex default" class="input-base w-40 h-9" />
            </div>
            <div class="flex items-center gap-2">
                <label for="workingDir" class="label-base text-muted-foreground">Path</label>
                <input type="text" id="workingDir" value="./test-app"
                    class="input-base w-48 h-9 font-mono text-xs text-muted-foreground" />
            </div>
            <button onclick="runPipeline()" class="btn btn-primary h-9 gap-2 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14"></path>
                    <path d="m12 5 7 7-7 7"></path>
                </svg>
                Deploy Flow
            </button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">

        <!-- Sidebar Navigation -->
        <nav class="w-72 border-r bg-background flex flex-col shrink-0 overflow-hidden z-40">
            <!-- Sidebar Tabs -->
            <div class="flex p-4 pb-2">
                <div
                    class="inline-flex h-9 items-center justify-center rounded-md bg-muted p-1 text-muted-foreground w-full">
                    <button onclick="switchSidebarTab('flows')" id="tab-flows"
                        class="sidebar-tab inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1 text-sm font-medium ring-offset-background transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 flex-1 bg-background text-foreground shadow-sm">Flows</button>
                    <button onclick="switchSidebarTab('edit')" id="tab-edit"
                        class="sidebar-tab inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1 text-sm font-medium ring-offset-background transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 flex-1 hover:text-foreground">Node</button>
                </div>
            </div>

            <!-- Flows / Inventory -->
            <div id="sidebar-flows" class="flex-1 flex flex-col overflow-hidden">
                <div class="px-5 py-2 flex items-center justify-between">
                    <h2 class="font-semibold text-sm tracking-tight">Saved Flows</h2>
                    <button onclick="createNewFlow()" class="btn btn-ghost btn-sm h-8 px-2" title="New Flow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14" />
                            <path d="M12 5v14" />
                        </svg>
                    </button>
                </div>

                <div id="flow-list" class="flex-1 overflow-y-auto scroll-area px-3 space-y-1">
                    <!-- Flows populated here -->
                </div>

                <div class="p-4 border-t bg-muted/30">
                    <label class="label-base text-xs mb-2 block">Save Current State</label>
                    <div class="flex gap-2">
                        <input type="text" id="flowName" placeholder="filename.dot" class="input-base h-9 text-xs" />
                        <button onclick="saveCurrentFlow()" class="btn btn-secondary h-9 px-3">Save</button>
                    </div>
                </div>
            </div>

            <!-- Node Editor Configuration -->
            <div id="sidebar-edit" class="hidden flex-1 flex flex-col overflow-hidden">
                <div class="px-5 py-2">
                    <h2 class="font-semibold text-sm tracking-tight">Configuration</h2>
                </div>

                <div id="no-node-selected"
                    class="flex-1 flex flex-col items-center justify-center text-center px-6 text-muted-foreground p-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="mb-4 opacity-50">
                        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                        <path d="M12 8v8"></path>
                        <path d="M8 12h8"></path>
                    </svg>
                    <p class="text-sm">Select a component on the canvas to inspect and edit its properties.</p>
                </div>

                <div id="node-editor" class="hidden flex-1 overflow-y-auto scroll-area px-5 pb-5 space-y-5">
                    <div class="space-y-1.5">
                        <label class="label-base">Node ID</label>
                        <input type="text" id="edit-node-id" readonly
                            class="input-base bg-muted/50 cursor-not-allowed font-mono text-xs" />
                    </div>

                    <div class="space-y-1.5">
                        <label class="label-base">Label</label>
                        <input type="text" id="edit-node-label" class="input-base" />
                    </div>

                    <div class="space-y-1.5">
                        <label class="label-base">Handler</label>
                        <select id="edit-node-shape" class="input-base">
                            <option value="box">Codergen (Execute Tool)</option>
                            <option value="hexagon">Wait for Human</option>
                            <option value="diamond">Conditional Gate</option>
                            <option value="parallelogram">Parallel Execution</option>
                            <option value="Mdiamond">Start Node</option>
                            <option value="Msquare">End Node</option>
                        </select>
                    </div>

                    <div class="space-y-1.5">
                        <label class="label-base">Prompt Instruction</label>
                        <textarea id="edit-node-prompt" rows="8"
                            class="flex w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 resize-none font-mono text-xs"></textarea>
                    </div>

                    <button onclick="applyNodeChanges()" class="btn btn-primary w-full shadow-sm">Apply Changes</button>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="flex-1 relative flex flex-col overflow-hidden bg-muted/10">

            <!-- Graph Canvas -->
            <div id="network-container" class="flex-1 relative overflow-hidden">
                <div class="absolute top-4 left-4 z-20 flex gap-2 transition-opacity" id="canvas-tools">
                    <button onclick="visAddNode()"
                        class="btn btn-secondary shadow-sm text-xs h-8 bg-background/80 backdrop-blur">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="mr-1 inline-block">
                            <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                            <path d="M12 8v8"></path>
                            <path d="M8 12h8"></path>
                        </svg>
                        Add Node
                    </button>
                    <button onclick="visAddEdgeMode()"
                        class="btn btn-secondary shadow-sm text-xs h-8 bg-background/80 backdrop-blur">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="mr-1 inline-block">
                            <path d="M5 12h14"></path>
                            <path d="m12 5 7 7-7 7"></path>
                        </svg>
                        Connect Nodes
                    </button>
                </div>
                <div id="network" class="w-full h-full"></div>

                <!-- Inspector (Execution Mode Only) -->
                <div id="node-details"
                    class="inspector-panel collapsed border-l bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/80 w-[400px] shadow-2xl absolute right-0 top-0 h-full z-20 flex flex-col">
                    <div class="h-14 border-b flex items-center justify-between px-6 shrink-0">
                        <div class="flex items-center gap-3">
                            <h3 class="font-semibold tracking-tight" id="detail-node-id">Node</h3>
                            <span id="detail-node-status" class="badge badge-outline">IDLE</span>
                        </div>
                        <button onclick="closeDetails()" class="btn btn-ghost btn-icon" title="Close Inspector">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M18 6 6 18"></path>
                                <path d="m6 6 12 12"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-6 scroll-area space-y-6">
                        <div class="space-y-2">
                            <h4 class="text-sm font-semibold text-muted-foreground">Prompt</h4>
                            <div id="detail-prompt"
                                class="text-sm font-mono bg-muted/50 p-4 rounded-md border whitespace-pre-wrap"></div>
                        </div>
                        <div class="space-y-2">
                            <h4 class="text-sm font-semibold text-muted-foreground">Execution Output</h4>
                            <div id="detail-response"
                                class="text-sm font-mono bg-muted/50 p-4 rounded-md border whitespace-pre-wrap text-muted-foreground">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Technical Source View (Editor Mode Only) -->
            <div id="editor-text-container"
                class="h-64 border-t flex flex-col bg-background hidden z-30 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
                <div class="h-10 border-b flex items-center px-4 justify-between bg-muted/30 shrink-0">
                    <span class="text-xs font-semibold text-muted-foreground uppercase tracking-wider">DOT Source</span>
                    <span id="flowStatus" class="badge badge-secondary text-[10px] hidden">Synchronizing...</span>
                </div>
                <textarea id="blueprint"
                    class="flex-1 bg-transparent p-6 font-mono text-xs outline-none resize-none text-muted-foreground scroll-area"
                    spellcheck="false"></textarea>
            </div>

            <!-- Terminal Window (Execution Mode Only) -->
            <footer id="execution-logs"
                class="h-72 border-t bg-background flex flex-col hidden z-30 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
                <div class="h-10 border-b flex items-center justify-between px-4 bg-muted/30 shrink-0">
                    <div class="flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="text-muted-foreground">
                            <polyline points="4 17 10 11 4 5"></polyline>
                            <line x1="12" x2="20" y1="19" y2="19"></line>
                        </svg>
                        <span class="text-xs font-semibold text-muted-foreground uppercase tracking-wider">Terminal
                            Output</span>
                    </div>
                    <button onclick="clearLogs()" class="btn btn-ghost btn-sm h-7 text-xs">Clear</button>
                </div>
                <div id="logs" class="flex-1 p-4 overflow-y-auto scroll-area font-mono text-sm space-y-1">
                    <!-- Logs populated here -->
                </div>
            </footer>
        </main>
    </div>

    <script>
        // --- STATE ---
        let currentFlowName = "";
        let viewMode = 'editor';
        let sidebarTab = 'flows';
        let nodesData = new vis.DataSet([]);
        let edgesData = new vis.DataSet([]);
        let network = null;
        let selectedNodeId = null;
        let runtimeState = { nodes: {} };

        // We pull the actual computed CSS variables for vis.js to use
        function getCssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

        // --- INITIALIZATION ---
        window.onload = () => {
            initNetwork();
            loadFlows();
            previewBlueprint();
            switchView('editor');

            // Re-render network theme if system theme changes, but we forced dark mode mostly
        };

        function initNetwork() {
            const container = document.getElementById('network');
            const data = { nodes: nodesData, edges: edgesData };

            const colorBg = 'hsl(240, 10%, 3.9%)';     // --background
            const colorBorder = 'hsl(240, 3.7%, 15.9%)';  // --border
            const colorPrimary = 'hsl(0, 0%, 98%)';    // --primary
            const colorHover = 'hsl(240, 3.7%, 15.9%)';   // --muted

            const options = {
                layout: {
                    hierarchical: { enabled: true, direction: 'UD', sortMethod: 'directed', nodeSpacing: 250, levelSeparation: 150 }
                },
                physics: { enabled: false },
                interaction: { hover: true, tooltipDelay: 200 },
                nodes: {
                    shape: 'box',
                    font: { face: 'Inter', size: 14, color: colorPrimary, bold: false },
                    margin: { top: 12, bottom: 12, left: 16, right: 16 },
                    borderWidth: 1,
                    borderWidthSelected: 2,
                    borderRadius: 6, // matching shadcn rounded-md roughly
                    color: {
                        background: colorBg,
                        border: colorBorder,
                        highlight: { background: colorHover, border: colorPrimary },
                        hover: { background: colorHover, border: colorBorder }
                    },
                    shadow: { enabled: true, color: 'rgba(0,0,0,0.5)', size: 10, x: 0, y: 4 }
                },
                edges: {
                    arrows: { to: { enabled: true, scaleFactor: 0.8 } },
                    color: { color: colorBorder, highlight: colorPrimary, hover: colorPrimary },
                    width: 1.5,
                    selectionWidth: 2,
                    smooth: { type: 'horizontal', roundness: 0.5 }
                },
                manipulation: {
                    enabled: false,
                    addEdge: function (data, callback) {
                        if (data.from === data.to) return callback(null);
                        let dot = document.getElementById('blueprint').value;
                        const newEdgeText = `    ${data.from} -> ${data.to};`;
                        if (dot.lastIndexOf('}') > -1) {
                            dot = dot.substring(0, dot.lastIndexOf('}')) + newEdgeText + '\n}\n';
                        } else {
                            dot += `\n${newEdgeText}`;
                        }
                        document.getElementById('blueprint').value = dot;
                        callback(null); // Return null because previewBlueprint replaces everything
                        previewBlueprint();
                    }
                }
            };
            network = new vis.Network(container, data, options);

            network.on("selectNode", params => showNodeInInspector(params.nodes[0]));
            network.on("deselectNode", () => hideNodeInspector());
        }

        // --- NAVIGATION ---
        function switchView(mode) {
            viewMode = mode;
            // Update Tab UI
            document.querySelectorAll('.view-tab').forEach(el => {
                el.classList.remove('bg-background', 'text-foreground', 'shadow-sm');
                el.classList.add('hover:text-foreground');
            });
            const btn = document.getElementById(`view-${mode}`);
            btn.classList.add('bg-background', 'text-foreground', 'shadow-sm');
            btn.classList.remove('hover:text-foreground');

            // Toggle Panels
            document.getElementById('editor-text-container').classList.toggle('hidden', mode !== 'editor');
            document.getElementById('canvas-tools').classList.toggle('hidden', mode !== 'editor');
            document.getElementById('execution-logs').classList.toggle('hidden', mode !== 'execution');

            // Specific panel logic
            if (mode === 'editor') {
                document.getElementById('node-details').classList.add('collapsed');
            } else {
                if (network && network.disableEditMode) network.disableEditMode();
                switchSidebarTab('flows'); // Force out of edit mode if switching to execution
            }
        }

        function switchSidebarTab(tab) {
            sidebarTab = tab;
            // Update Tab UI
            document.querySelectorAll('.sidebar-tab').forEach(el => {
                el.classList.remove('bg-background', 'text-foreground', 'shadow-sm');
                el.classList.add('hover:text-foreground');
            });
            const btn = document.getElementById(`tab-${tab}`);
            btn.classList.add('bg-background', 'text-foreground', 'shadow-sm');
            btn.classList.remove('hover:text-foreground');

            // Toggle Content
            document.getElementById('sidebar-flows').classList.toggle('hidden', tab !== 'flows');
            document.getElementById('sidebar-edit').classList.toggle('hidden', tab !== 'edit');
        }

        // --- API & DATA ---
        async function loadFlows() {
            const res = await fetch('/api/flows');
            const flows = await res.json();
            const list = document.getElementById('flow-list');
            list.innerHTML = flows.map(f => {
                const isActive = f === currentFlowName;
                return `
                <button onclick="loadFlow('${f}')" class="w-full text-left px-3 py-2 rounded-md text-sm transition-colors ${isActive ? 'bg-secondary text-secondary-foreground font-medium' : 'text-muted-foreground hover:bg-muted hover:text-foreground'}">
                    ${f}
                </button>
            `}).join('');
        }

        async function loadFlow(name) {
            currentFlowName = name;
            const res = await fetch(`/api/flows/${name}`);
            const data = await res.json();
            document.getElementById('blueprint').value = data.content;
            document.getElementById('flowName').value = name;
            previewBlueprint();
            loadFlows();
        }

        function createNewFlow() {
            document.getElementById('blueprint').value = 'digraph NewFlow {\n  start [shape=Mdiamond];\n  exit [shape=Msquare];\n  start -> exit;\n}';
            currentFlowName = "new_flow.dot";
            document.getElementById('flowName').value = "new_flow.dot";
            previewBlueprint();
            loadFlows();
        }

        async function saveCurrentFlow() {
            const name = document.getElementById('flowName').value || currentFlowName;
            if (!name) return;
            const content = document.getElementById('blueprint').value;
            await fetch('/api/flows', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, content })
            });
            currentFlowName = name.endsWith('.dot') ? name : name + '.dot';
            loadFlows();
        }

        // --- GRAPH LOGIC ---
        function getThemeForStatus(status) {
            // Mapping statuses to shadcn-ish colors for the graph
            switch (status) {
                case 'running': return { background: 'hsl(240, 3.7%, 15.9%)', border: 'hsl(0, 0%, 98%)', font: 'hsl(0, 0%, 98%)' };
                case 'success': return { background: 'hsl(240, 10%, 3.9%)', border: 'hsl(142.1, 70.6%, 45.3%)', font: 'hsl(142.1, 70.6%, 45.3%)' };
                case 'failed': return { background: 'hsl(240, 10%, 3.9%)', border: 'hsl(0, 84.2%, 60.2%)', font: 'hsl(0, 84.2%, 60.2%)' };
                default: return { background: 'hsl(240, 10%, 3.9%)', border: 'hsl(240, 3.7%, 15.9%)', font: 'hsl(0, 0%, 98%)' };
            }
        }

        function renderGraph(payload) {
            nodesData.clear();
            edgesData.clear();
            payload.nodes.forEach(n => {
                const s = (runtimeState.nodes[n.id] || {}).status || "pending";
                nodesData.add({ id: n.id, label: n.label, color: getThemeForStatus(s), shape: n.shape || 'box' });
            });
            payload.edges.forEach(e => edgesData.add({ from: e.from, to: e.to }));
            network.fit();
        }

        async function previewBlueprint() {
            const flow_content = document.getElementById('blueprint').value;
            try {
                const res = await fetch('/preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ flow_content })
                });
                const data = await res.json();
                if (data.graph) renderGraph(data.graph);
            } catch (err) { console.error("Preview fail", err); }
        }

        // --- NODE EDIT / INSPECTOR ---
        function showNodeInInspector(id) {
            selectedNodeId = id;
            const node = nodesData.get(id);

            if (viewMode === 'editor') {
                switchSidebarTab('edit');
                document.getElementById('no-node-selected').classList.add('hidden');
                document.getElementById('node-editor').classList.remove('hidden');
                document.getElementById('edit-node-id').value = id;
                document.getElementById('edit-node-label').value = node.label;
                document.getElementById('edit-node-shape').value = node.shape || 'box';

                const dot = document.getElementById('blueprint').value;
                const match = dot.match(new RegExp(`${id}\\s*\\[[^\\]]*prompt="([^"]+)"`, 'm'));
                document.getElementById('edit-node-prompt').value = match ? match[1].replace(/\\n/g, '\n') : "";
            } else {
                const state = runtimeState.nodes[id] || { status: 'PENDING', prompt: '', response: '' };
                document.getElementById('detail-node-id').innerText = id;

                const statusEl = document.getElementById('detail-node-status');
                statusEl.innerText = state.status.toUpperCase();
                // Map status to shadcn badge colors
                statusEl.className = 'badge text-[10px] ';
                if (state.status === 'success') statusEl.className += 'border-transparent bg-green-500/20 text-green-500 hover:bg-green-500/30';
                else if (state.status === 'failed') statusEl.className += 'border-transparent bg-destructive/20 text-destructive hover:bg-destructive/30';
                else if (state.status === 'running') statusEl.className += 'border-transparent bg-primary text-primary-foreground';
                else statusEl.className += 'badge-outline';

                document.getElementById('detail-prompt').innerText = state.prompt || "(No prompt recorded)";

                const respEl = document.getElementById('detail-response');
                respEl.innerText = state.response || "-";
                respEl.classList.toggle('text-muted-foreground', !state.response);

                document.getElementById('node-details').classList.remove('collapsed');
            }
        }

        function hideNodeInspector() {
            if (viewMode === 'editor') {
                document.getElementById('no-node-selected').classList.remove('hidden');
                document.getElementById('node-editor').classList.add('hidden');
            }
        }

        function closeDetails() {
            document.getElementById('node-details').classList.add('collapsed');
        }

        function applyNodeChanges() {
            if (!selectedNodeId) return;
            const label = document.getElementById('edit-node-label').value;
            const shape = document.getElementById('edit-node-shape').value;
            const prompt = document.getElementById('edit-node-prompt').value.replace(/\n/g, '\\n');

            let dot = document.getElementById('blueprint').value;
            const nodePattern = new RegExp(`^\\s*${selectedNodeId}\\s*\\[[^\\]]*\\];?`, 'm');
            const newNodeText = `    ${selectedNodeId} [label="${label}", shape=${shape}, prompt="${prompt}"];`;

            dot = dot.match(nodePattern) ? dot.replace(nodePattern, newNodeText) : dot.replace(/digraph\s+\w+\s+\{/, `$& \n${newNodeText}`);
            document.getElementById('blueprint').value = dot;

            const statusEl = document.getElementById('flowStatus');
            statusEl.classList.remove('hidden');
            setTimeout(() => {
                previewBlueprint();
                statusEl.classList.add('hidden');
            }, 300);
        }

        function visAddNode() {
            let dot = document.getElementById('blueprint').value;
            const newId = 'node_' + Math.floor(Math.random() * 10000);
            const newNodeText = `    ${newId} [label="New Node", type=task];`;

            if (dot.lastIndexOf('}') > -1) {
                dot = dot.substring(0, dot.lastIndexOf('}')) + newNodeText + '\n}\n';
            } else {
                dot += `\n${newNodeText}`;
            }
            document.getElementById('blueprint').value = dot;

            const statusEl = document.getElementById('flowStatus');
            if (statusEl) statusEl.classList.remove('hidden');

            setTimeout(() => {
                previewBlueprint().then(() => {
                    if (statusEl) statusEl.classList.add('hidden');
                    // wait a tick for dom to render, then select it automatically
                    setTimeout(() => {
                        network.selectNodes([newId]);
                        showNodeInInspector(newId);
                    }, 50);
                });
            }, 100);
        }

        function visAddEdgeMode() {
            network.addEdgeMode();
        }

        // --- WEB SOCKET & LOGS ---
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        ws.onmessage = e => {
            const d = JSON.parse(e.data);
            if (d.type === "graph") renderGraph(d);
            else if (d.type === "state") {
                if (!runtimeState.nodes[d.node]) runtimeState.nodes[d.node] = {};
                runtimeState.nodes[d.node].status = d.status;
                if (nodesData.get(d.node)) nodesData.update({ id: d.node, color: getThemeForStatus(d.status) });
                if (selectedNodeId === d.node && viewMode === 'execution') showNodeInInspector(d.node);
            }
            else if (d.type === "log") appendLog(d.msg);
        };

        function appendLog(msg) {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = "flex gap-4 py-0.5 border-b border-white/5 last:border-0 hover:bg-muted/50 rounded px-2";

            const time = `<span class="text-muted-foreground w-20 shrink-0 select-none">${new Date().toLocaleTimeString('en-GB', { hour12: false })}</span>`;

            let contentClass = "text-foreground";
            if (msg.includes("success")) contentClass = "text-green-400";
            if (msg.includes("fail") || msg.includes("error") || msg.includes("⚠️")) contentClass = "text-destructive";

            div.innerHTML = `${time}<span class="${contentClass} break-all">${msg}</span>`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        function clearLogs() { document.getElementById('logs').innerHTML = ''; }

        async function runPipeline() {
            switchView('execution');
            clearLogs();
            runtimeState.nodes = {};
            nodesData.forEach(n => nodesData.update({ id: n.id, color: getThemeForStatus('pending') }));

            await fetch('/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    flow_content: document.getElementById('blueprint').value,
                    working_directory: document.getElementById('workingDir').value,
                    model: document.getElementById('model').value,
                    backend: "codex"
                })
            });
        }

    </script>
</body>

</html>
