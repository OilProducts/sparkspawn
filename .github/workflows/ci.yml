name: CI

on:
  pull_request:
  push:

jobs:
  dot-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: DOT lint
        run: uv run pytest -q tests/integration/test_dot_format_lint.py

      - name: Parser unsupported grammar regression suite
        run: just parser-unsupported-grammar

      - name: Integration smoke pipeline
        run: uv run pytest -q tests/integration/test_integration_smoke_pipeline.py
